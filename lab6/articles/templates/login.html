<!DOCTYPE html>
<html>
    <head>
        <title>Django Public Blog - вход</title>
        <link rel="stylesheet" href="{{ STATIC_URL }}css/article.css">
    </head>
    <body>
        <div class="content">
            <h1>Авторизация</h1>
            <form method="POST">{% csrf_token %}
                <input type="text" name="username" placeholder="Никнейм"><br>
                <input type="password" name="password" placeholder="Пароль"><br>
                <input type="submit" value="Войти">
            </form>
            {{ errors }}
            <p><a href="/register/">Нет аккаунта? Зарегистрироваться</a></p>
        </div>
    </body>
</html>
